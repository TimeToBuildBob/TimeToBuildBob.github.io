    updateVisibility();
  });
  label.appendChild(cb);
  label.appendChild(document.createTextNode(val.label));
  controlsEl.appendChild(label);
});

// SVG setup
const svg = d3.select('#graph');
const width = window.innerWidth;
const height = window.innerHeight;
svg.attr('viewBox', [0, 0, width, height]);

const g = svg.append('g');

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.1, 8])
  .on('zoom', (event) => g.attr('transform', event.transform));
svg.call(zoom);

// Simulation
const simulation = d3.forceSimulation(rawNodes)
  .force('link', d3.forceLink(rawEdges)
    .id(d => d.id)
    .distance(d => d.type === 'tagged' ? 60 : 100)
    .strength(d => d.type === 'tagged' ? 0.3 : 0.15))
  .force('charge', d3.forceManyBody().strength(-120).distanceMax(400))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(12));

// Links
const linkGroup = g.append('g').attr('class', 'links');
const link = linkGroup.selectAll('line')
  .data(rawEdges)
  .join('line')
  .attr('stroke', d => {
    if (d.type === 'depends_on') return '#e74c3c';
    if (d.type === 'tagged') return '#1abc9c';
    if (d.type === 'related') return '#3498db';
    return '#30363d';
  })
  .attr('stroke-opacity', 0.3)
  .attr('stroke-width', d => d.type === 'depends_on' ? 2 : 1);

// Nodes
const nodeGroup = g.append('g').attr('class', 'nodes');
const node = nodeGroup.selectAll('circle')
  .data(rawNodes)
  .join('circle')
  .attr('r', d => {
    if (d.category === 'person') return 8;
    if (d.category === 'package') return 7;
    if (d.category === 'tool') return 5;
    return 6;
  })
  .attr('fill', d => CATEGORIES[d.category]?.color || '#666')
  .attr('stroke', '#0d1117')
  .attr('stroke-width', 1.5)
  .attr('cursor', 'pointer')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended));

// Labels (only for larger nodes)
const labels = g.append('g').attr('class', 'labels');
const label = labels.selectAll('text')
  .data(rawNodes.filter(d => ['person', 'package'].includes(d.category)))
  .join('text')
  .text(d => d.label)
  .attr('font-size', 10)
  .attr('fill', '#8b949e')
  .attr('dx', 12)
  .attr('dy', 4)
  .style('pointer-events', 'none');

// Tooltip
const tooltip = document.getElementById('tooltip');
node.on('mouseover', (event, d) => {
  tooltip.style.display = 'block';
  tooltip.querySelector('.tt-label').textContent = d.label;
  tooltip.querySelector('.tt-cat').textContent =
    (CATEGORIES[d.category]?.label || d.category) +
    (d.subcategory ? ` / ${d.subcategory}` : '');
  let detail = '';
  if (d.state) detail += `State: ${d.state}\n`;
  if (d.priority) detail += `Priority: ${d.priority}\n`;
  if (d.status) detail += `Status: ${d.status}\n`;
  if (d.tags?.length) detail += `Tags: ${d.tags.join(', ')}\n`;
  if (d.path) detail += `${d.path}`;
  tooltip.querySelector('.tt-detail').textContent = detail;
})
.on('mousemove', (event) => {
  tooltip.style.left = (event.clientX + 12) + 'px';
  tooltip.style.top = (event.clientY - 10) + 'px';
})
.on('mouseout', () => { tooltip.style.display = 'none'; });

// Highlight on click
node.on('click', (event, d) => {
  const neighbors = new Set();
  neighbors.add(d.id);
  rawEdges.forEach(e => {
    const src = typeof e.source === 'object' ? e.source.id : e.source;
    const tgt = typeof e.target === 'object' ? e.target.id : e.target;
    if (src === d.id) neighbors.add(tgt);
    if (tgt === d.id) neighbors.add(src);
  });

  node.attr('opacity', n => neighbors.has(n.id) ? 1 : 0.1);
  link.attr('stroke-opacity', e => {
    const src = typeof e.source === 'object' ? e.source.id : e.source;
    const tgt = typeof e.target === 'object' ? e.target.id : e.target;
    return neighbors.has(src) && neighbors.has(tgt) ? 0.8 : 0.02;
  });

  event.stopPropagation();
});

svg.on('click', () => {
  node.attr('opacity', 1);
  link.attr('stroke-opacity', 0.3);
});

// Search
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase();
  if (!q) {
    node.attr('opacity', 1);
    link.attr('stroke-opacity', 0.3);
    return;
  }
  node.attr('opacity', d => d.label.toLowerCase().includes(q) || d.id.toLowerCase().includes(q) ? 1 : 0.1);
  link.attr('stroke-opacity', 0.05);
});

// Tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  node
    .attr('cx', d => d.x)
    .attr('cy', d => d.y);

  label
    .attr('x', d => d.x)
    .attr('y', d => d.y);
});

function updateVisibility() {
  node.attr('display', d => activeCategories.has(d.category) ? null : 'none');
  link.attr('display', d => {
    const src = typeof d.source === 'object' ? d.source : rawNodes.find(n => n.id === d.source);
    const tgt = typeof d.target === 'object' ? d.target : rawNodes.find(n => n.id === d.target);
    return src && tgt && activeCategories.has(src.category) && activeCategories.has(tgt.category) ? null : 'none';
  });
}

function dragstarted(event) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  event.subject.fx = event.subject.x;
  event.subject.fy = event.subject.y;
}
function dragged(event) {
  event.subject.fx = event.x;
  event.subject.fy = event.y;
}
function dragended(event) {
  if (!event.active) simulation.alphaTarget(0);
  event.subject.fx = null;
  event.subject.fy = null;
}
</script>
</body>
</html>
