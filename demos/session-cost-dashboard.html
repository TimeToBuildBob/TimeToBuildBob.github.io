<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bob Operational Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --card-bg: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-secondary: #8b949e;
    --green: #3fb950;
    --yellow: #d2991d;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .header {
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .subtitle { font-size: 13px; color: var(--text-secondary); }
  .container { max-width: 1400px; margin: 0 auto; padding: 16px 24px; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .stat-card .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-card .value { font-size: 28px; font-weight: 600; }
  .stat-card .trend { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .chart-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
    gap: 16px;
  }
  .chart-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px;
  }
  .chart-card.full-width { grid-column: 1 / -1; }
  .chart-card h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }

  /* Bar chart CSS */
  .bar-group { display: flex; align-items: flex-end; gap: 3px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 12px; }
  .bar { width: 100%; min-width: 6px; max-width: 24px; border-radius: 3px 3px 0 0; transition: opacity 0.15s; }
  .bar:hover { opacity: 1 !important; }
  .bar-col .lbl { font-size: 9px; color: var(--text-secondary); writing-mode: vertical-lr; text-orientation: mixed; max-height: 40px; overflow: hidden; }
  .dual-bar-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .dual-bar-row .lbl { font-size: 12px; min-width: 110px; color: var(--text); text-align: right; }
  .dual-bar-row .bars { display: flex; align-items: center; gap: 6px; flex: 1; }
  .bar-s { height: 16px; border-radius: 3px; background: var(--blue); opacity: 0.6; min-width: 2px; transition: opacity 0.15s; }
  .bar-s:hover { opacity: 1; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 6px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
  code { font-size: 12px; background: var(--card-bg); padding: 2px 6px; border-radius: 4px; }
  .grade-bar-inline { display: inline-block; height: 8px; border-radius: 4px; margin-right: 6px; vertical-align: middle; min-width: 2px; }
  /* Freshness banner */
  .freshness-banner { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .freshness-banner.warning { background: rgba(210, 153, 29, 0.15); border: 1px solid var(--yellow); color: var(--yellow); }
  .freshness-banner.danger { background: rgba(248, 81, 73, 0.15); border: 1px solid var(--red); color: var(--red); }
  .freshness-banner.ok { background: rgba(63, 185, 80, 0.1); border: 1px solid var(--green); color: var(--green); }

  /* Subscription gauge */
  .gauge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .gauge-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: center; }
  .gauge-card .slot-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .gauge-card .gauge-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 8px; }
  .gauge-ring { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto; position: relative; display: flex; align-items: center; justify-content: center; }
  .gauge-ring .gauge-value { font-size: 20px; font-weight: 700; }
  .gauge-ring .gauge-percent { font-size: 11px; color: var(--text-secondary); }
  .gauge-ring.active-slot::after { content: "●"; position: absolute; top: -4px; right: -4px; font-size: 10px; color: var(--green); }
  /* PR Queue Health */
  .pr-queue-section { margin-bottom: 16px; }
  .pr-queue-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .pr-stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .pr-stat-card .pr-stat-value { font-size: 22px; font-weight: 700; }
  .pr-stat-card .pr-stat-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .pr-repo-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
  .pr-repo-row .repo-name { min-width: 200px; }
  .pr-repo-bar { height: 12px; border-radius: 3px; min-width: 2px; transition: opacity 0.15s; }

  /* Footer */
  .footer { text-align: center; padding: 24px; font-size: 11px; color: var(--text-secondary); }
  .footer a { color: var(--blue); text-decoration: none; }
</style>
</head>

<script>
// ── Data ──
const raw = JSON.parse(document.getElementById('data-store').textContent);
document.getElementById('genTime').textContent = raw._meta.generated_at;

// ── Freshness indicator ──
(function() {
  const genAt = new Date(raw._meta.generated_at.replace(' UTC', 'Z'));
  const now = new Date();
  const hoursAgo = (now - genAt) / (1000 * 60 * 60);
  const banner = document.getElementById('freshnessBanner');
  if (hoursAgo > 72) {
    banner.className = 'freshness-banner danger';
    banner.innerHTML = '<span>⚠️</span> <span>Data is <strong>' + Math.round(hoursAgo) + 'h old</strong> — significantly stale. Regenerate the dashboard.</span>';
  } else if (hoursAgo > 24) {
    banner.className = 'freshness-banner warning';
    banner.innerHTML = '<span>⚠️</span> <span>Data is <strong>' + Math.round(hoursAgo) + 'h old</strong> — may be stale. Consider regenerating.</span>';
  } else {
    banner.className = 'freshness-banner ok';
    banner.innerHTML = '<span>✓</span> <span>Data is <strong>' + Math.round(hoursAgo) + 'h old</strong> — fresh.</span>';
  }
})();

// ── Subscription utilization gauges ──
(function() {
  const sub = raw.subscription;
  const slots = sub.slots;
  const active = sub.active_slot;
  const slotKeys = Object.keys(slots);
  const colors = {bob: 'var(--blue)', alice: 'var(--purple)', erik: 'var(--green)'};
  const gaugeHTML = slotKeys.map(name => {
    const util = slots[name]['5h'];
    const pct = (util * 100).toFixed(0);
    const color = util > 0.8 ? 'var(--green)' : util > 0.3 ? 'var(--yellow)' : 'var(--red)';
    const isActive = name === active ? ' active-slot' : '';
    const activeLabel = isActive ? ' (active)' : '';
    return '<div class="gauge-card">' +
      '<div class="slot-name">' + name.charAt(0).toUpperCase() + name.slice(1) + activeLabel + '</div>' +
      '<div class="gauge-ring' + isActive + '" style="border: 4px solid ' + color + '">' +
        '<div><div class="gauge-value">' + pct + '</div><div class="gauge-percent">%</div></div>' +
      '</div>' +
      '<div class="gauge-label">5h window</div>' +
    '</div>';
  }).join('');
  document.getElementById('gaugeGrid').innerHTML = gaugeHTML;
})();



// ── PR Queue Health ──
(function() {
  const pq = raw.pr_queue;
  const green = '#3fb950', yellow = '#d2991d', red = '#f85149';
  const statusColor = pq.total_open < pq.target ? green : pq.stale_count > 0 ? red : yellow;
  document.getElementById('prQueueGrid').innerHTML = [
    {label:'Open PRs', value:pq.total_open, color:statusColor},
    {label:'Stale', value:pq.stale_count, color:pq.stale_count > 0 ? red : green},
    {label:'Failing CI', value:pq.failing_ci, color:pq.failing_ci > 0 ? red : green},
    {label:'Avg Age', value:pq.avg_age_days + 'd', color:pq.avg_age_days > 7 ? red : yellow}
  ].map(s => '<div class="pr-stat-card"><div class="pr-stat-value" style="color:' + s.color + '">' + s.value + '</div><div class="pr-stat-label">' + s.label + '</div></div>').join('');
  const repoHTML = pq.repos.map(r => {
    const pct = Math.min(r.open / r.limit * 100, 100);
    const barColor = pct > 80 ? red : pct > 50 ? yellow : green;
    return '<div class="pr-repo-row"><span class="repo-name">' + r.name + '</span><div class="pr-repo-bar" style="width:' + pct * 2 + 'px;background:' + barColor + '"></div><span style="font-size:10px;color:var(--text-secondary)">' + r.open + '/' + r.limit + '</span></div>';
  }).join('');
  document.getElementById('prRepoList').innerHTML = repoHTML;
})();

// ── Stat cards ──
const total = raw.daily.reduce((s,d) => s + d.sessions, 0);
const productive = raw.daily.reduce((s,d) => s + d.productive, 0);
const avgGrade = (raw.daily.reduce((s,d) => s + d.avg_grade * d.sessions, 0) / total).toFixed(3);
const totalHours = raw.daily.reduce((s,d) => s + d.total_hours, 0);

const green = '#3fb950', yellow = '#d2991d', red = '#f85149';
document.getElementById('statsGrid').innerHTML = `
  <div class="stat-card"><div class="label">Total Sessions</div><div class="value">${total}</div><div class="trend">${raw._meta.days}d window</div></div>
  <div class="stat-card"><div class="label">Productive</div><div class="value" style="color:${green}">${productive}</div><div class="trend">${(productive/total*100).toFixed(1)}% rate</div></div>
  <div class="stat-card"><div class="label">Avg Grade</div><div class="value" style="color:${avgGrade > 0.53 ? green : avgGrade > 0.48 ? yellow : red}">${avgGrade}</div><div class="trend">weighted average</div></div>
  <div class="stat-card"><div class="label">Total Hours</div><div class="value">${totalHours.toFixed(0)}</div><div class="trend">${(totalHours/24).toFixed(1)} agent-days</div></div>
`;

// ── Daily bar chart ──
const maxSessions = Math.max(...raw.daily.map(d => d.sessions));
const grades = raw.daily.map(d => d.avg_grade);
const maxGrade = Math.max(...grades);
const minGrade = Math.min(...grades);
const gradePad = 0.05; // 5% padding to prevent zero-height bars
const gradeRange = maxGrade - minGrade || 1; // prevent div-by-zero when all equal
const dailyHTML = raw.daily.map(d => {
  const sessionH = Math.max(2, (d.sessions / maxSessions) * 120);
  const gradeH = Math.max(2, ((d.avg_grade - minGrade) / gradeRange + gradePad) * 80 / (1 + gradePad));
  const label = d.day.slice(5);
  return `
    <div class="bar-col" title="${d.day}: ${d.sessions} sessions, grade ${d.avg_grade}">
      <div class="bar" style="height:${sessionH}px; background:var(--blue); opacity:0.35"></div>
      <div class="bar" style="height:${gradeH}px; background:${green}; opacity:0.65"></div>
      <div class="lbl">${label}</div>
    </div>`;
}).join('');
document.getElementById('dailyChart').innerHTML = `
  <div style="display:flex; align-items:flex-end; gap:4px; font-size:10px; color:var(--text-secondary); margin-bottom:4px">
    <span>&#x1F539; Sessions (max ${maxSessions})</span>
    <span style="margin-left:12px">&#x1F7E2; Grade (${minGrade.toFixed(2)}–${maxGrade.toFixed(2)})</span>
  </div>
  <div class="bar-group">${dailyHTML}</div>
`;

// ── Category bars ──
const maxCat = Math.max(...raw.categories.map(c => c.cnt));
const catHTML = raw.categories.map((c, i) => {
  const pct = (c.cnt / total * 100).toFixed(1);
  const w = Math.max(2, (c.cnt / maxCat) * 300);
  return `
    <div class="dual-bar-row">
      <div class="lbl">${c.category}</div>
      <div class="bars">
        <div class="bar-s" style="width:${w}px" title="${c.cnt} sessions, grade ${c.avg_grade}"></div>
        <span style="font-size:10px;color:var(--text-secondary);margin-left:6px">${c.cnt} (${pct}%)</span>
      </div>
    </div>`;
}).join('');
document.getElementById('categoryChart').innerHTML = catHTML;

// ── Harness bars ──
const maxHarness = Math.max(...raw.harnesses.map(h => h.cnt));
const harnessHTML = raw.harnesses.map(h => {
  const w = Math.max(2, (h.cnt / maxHarness) * 300);
  return `
    <div class="dual-bar-row">
      <div class="lbl">${h.harness}</div>
      <div class="bars">
        <div class="bar-s" style="width:${w}px" title="${h.cnt} sessions"></div>
        <span style="font-size:10px;color:var(--text-secondary);margin-left:6px">${h.cnt}</span>
        <span style="font-size:10px;color:${green};margin-left:4px">grade ${h.avg_grade}</span>
      </div>
    </div>`;
}).join('');
document.getElementById('harnessChart').innerHTML = harnessHTML;

// ── Weekly trend ──
const weeklyGrades = raw.weekly.map(w => w.avg_grade);
const weeklyMax = Math.max(...weeklyGrades);
const weeklyMin = Math.min(...weeklyGrades);
const weeklyRange = weeklyMax - weeklyMin || 1;
const weeklyHTML = raw.weekly.map((w, i) => {
  const h = Math.max(2, ((w.avg_grade - weeklyMin) / weeklyRange + gradePad) * 120 / (1 + gradePad));
  return `
    <div class="bar-col" title="${w.week}: grade ${w.avg_grade}">
      <div class="bar" style="height:${h}px; background:${green}; opacity:0.8"></div>
      <div class="lbl">${w.week}</div>
    </div>`;
}).join('');
document.getElementById('weeklyChart').innerHTML = `
  <div style="font-size:10px;color:var(--text-secondary);margin-bottom:6px">Grade range ${weeklyMin.toFixed(2)}–${weeklyMax.toFixed(2)}</div>
  <div class="bar-group">${weeklyHTML}</div>
`;

// ── Model table ──
const modelRows = raw.models.map((m, i) => {
  const barW = m.avg_grade * 200;
  const color = m.avg_grade > 0.55 ? green : m.avg_grade > 0.50 ? yellow : red;
  return `
    <tr>
      <td>${i + 1}</td>
      <td><code>${m.model}</code></td>
      <td>${m.cnt}</td>
      <td>
        <span class="grade-bar-inline" style="width:${barW}px; background:${color}"></span>
        ${m.avg_grade}
      </td>
    </tr>`;
}).join('');
document.getElementById('modelTable').innerHTML = `
  <thead><tr><th>#</th><th>Model</th><th>Sessions</th><th>Avg Grade</th></tr></thead>
  <tbody>${modelRows}</tbody>
`;
</script>
</body>
</html>
